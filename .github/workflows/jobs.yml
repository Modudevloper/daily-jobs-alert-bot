name: Daily Jobs Alert

on:
schedule:
- cron: "30 2 * * *"
- cron: "30 5 * * *"
- cron: "30 8 * * *"
- cron: "30 11 * * *"
- cron: "30 15 * * *"

workflow_dispatch:

jobs:
run-bot:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - run: pip install -r requirements.txt

  - name: Run Bot
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
    run: python auto_post.py
```
