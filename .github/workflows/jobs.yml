name: Daily Jobs Alert

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install requests feedparser

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python auto_post.py

      - name: Commit updated jobs list
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add posted_jobs.json

          git diff --staged --quiet || git commit -m "Update posted jobs"

          git push